<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 贪吃蛇</title>
<style>
  :root {
    --bg: #1a1a2e;
    --board-bg: #16213e;
    --snake-head: #00e676;
    --snake-body-1: #00c853;
    --snake-body-2: #69f0ae;
    --food: #ff1744;
    --food-glow: #ff5252;
    --text: #e0e0e0;
    --score: #ffd740;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 16px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 440px;
    color: var(--text);
  }
  .title {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--snake-head), var(--score));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .scores {
    display: flex;
    gap: 20px;
  }
  .score-box {
    text-align: center;
    background: var(--board-bg);
    padding: 8px 16px;
    border-radius: 12px;
    min-width: 80px;
  }
  .score-label {
    font-size: 10px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .score-value {
    font-size: 24px;
    font-weight: 700;
    color: var(--score);
  }
  .high-score .score-value {
    color: #ff8a80;
  }
  canvas {
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(0,230,118,0.15), 0 8px 32px rgba(0,0,0,0.4);
    background: var(--board-bg);
  }
  .controls-info {
    color: #666;
    font-size: 13px;
    text-align: center;
    letter-spacing: 1px;
  }
  .controls-info span {
    display: inline-block;
    background: var(--board-bg);
    padding: 3px 8px;
    border-radius: 4px;
    margin: 0 2px;
    font-weight: 600;
    color: #aaa;
  }
  .mobile-controls {
    display: none;
    width: 100%;
    max-width: 440px;
  }
  .dpad {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 6px;
    width: 200px;
    margin: 0 auto;
  }
  .dpad-btn {
    aspect-ratio: 1;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(22,33,62,0.8);
    color: #aaa;
    border-radius: 12px;
    font-size: 24px;
    cursor: pointer;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad-btn:active {
    background: rgba(0,230,118,0.3);
    border-color: var(--snake-head);
    transform: scale(0.9);
  }
  .dpad-up { grid-column: 2; }
  .dpad-left { grid-column: 1; grid-row: 2; }
  .dpad-center { grid-column: 2; grid-row: 2; }
  .dpad-right { grid-column: 3; grid-row: 2; }
  .dpad-down { grid-column: 2; grid-row: 3; }
  .dpad-center {
    border-color: transparent;
    background: transparent;
  }

  @media (max-width: 500px), (hover: none) and (pointer: coarse) {
    .mobile-controls { display: block; }
    .controls-info { display: none; }
    canvas { border-radius: 12px; }
  }

  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }
  .game-over-card {
    background: rgba(22,33,62,0.95);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 32px 40px;
    text-align: center;
    backdrop-filter: blur(10px);
    pointer-events: auto;
    animation: popIn 0.3s ease-out;
  }
  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .game-over-title {
    font-size: 32px;
    color: #ff5252;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .game-over-score {
    font-size: 48px;
    color: var(--score);
    font-weight: 800;
  }
  .game-over-new {
    color: #ff8a80;
    font-size: 14px;
    animation: blink 0.6s infinite;
    margin-bottom: 16px;
  }
  @keyframes blink {
    50% { opacity: 0.3; }
  }
  .btn {
    display: inline-block;
    margin-top: 16px;
    padding: 12px 32px;
    background: linear-gradient(135deg, var(--snake-head), #00b248);
    color: #000;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: transform 0.15s, box-shadow 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 24px rgba(0,230,118,0.4);
  }
  .btn:active {
    transform: scale(0.95);
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">🐍 贪吃蛇</div>
    <div class="scores">
      <div class="score-box">
        <div class="score-label">得分</div>
        <div class="score-value" id="score">0</div>
      </div>
      <div class="score-box high-score">
        <div class="score-label">最高</div>
        <div class="score-value" id="highScore">0</div>
      </div>
    </div>
  </div>

  <canvas id="game" width="440" height="440"></canvas>

  <div class="controls-info">
    <span>↑</span><span>↓</span><span>←</span><span>→</span> 或 <span>W</span><span>A</span><span>S</span><span>D</span> 移动 &nbsp;|&nbsp; <span>空格</span> 暂停
  </div>

  <div class="mobile-controls">
    <div class="dpad" id="dpad">
      <button class="dpad-btn dpad-up" data-dir="up">▲</button>
      <button class="dpad-btn dpad-left" data-dir="left">◀</button>
      <div class="dpad-btn dpad-center"></div>
      <button class="dpad-btn dpad-right" data-dir="right">▶</button>
      <button class="dpad-btn dpad-down" data-dir="down">▼</button>
    </div>
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="game-over-card" id="gameOverCard"></div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;
const TILE = GRID - 1;

let snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
let dir = {x:1, y:0};
let nextDir = {x:1, y:0};
let food = {};
let score = 0;
let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
let speed = 100;
let gameLoop = null;
let paused = false;
let gameOver = false;
let particles = [];
let ticks = 0;

document.getElementById('highScore').textContent = highScore;

function randomFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  return pos;
}

food = randomFood();

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x: x * GRID + GRID/2,
      y: y * GRID + GRID/2,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      size: 2 + Math.random() * 3,
      color: color
    });
  }
}

function update() {
  if (paused || gameOver) return;
  ticks++;

  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame();
    return;
  }

  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    spawnParticles(food.x, food.y, '#ff5252', 12);
    document.getElementById('score').textContent = score;
    food = randomFood();
    speed = Math.max(50, 100 - Math.floor(score / 50) * 5);
    restartLoop();
  } else {
    snake.pop();
  }

  // food pulse animation
  if (ticks % 10 === 0 && score > 80) {
    // subtle hard mode: occasionally shift food
  }
}

function drawGrid() {
  ctx.fillStyle = '#0f1923';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // subtle grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= canvas.width; x += GRID) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= canvas.height; y += GRID) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
  }
}

function draw() {
  drawGrid();

  // food glow
  const foodPhase = Math.sin(ticks * 0.1) * 0.5 + 0.5;
  const glowRadius = 8 + foodPhase * 4;
  const glow = ctx.createRadialGradient(
    food.x * GRID + GRID/2, food.y * GRID + GRID/2, 0,
    food.x * GRID + GRID/2, food.y * GRID + GRID/2, glowRadius
  );
  glow.addColorStop(0, 'rgba(255,23,68,0.5)');
  glow.addColorStop(1, 'rgba(255,23,68,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(
    food.x * GRID - glowRadius,
    food.y * GRID - glowRadius,
    glowRadius * 2, glowRadius * 2
  );

  // food body
  const foodSize = TILE - 1 + foodPhase * 2;
  const fx = food.x * GRID + (GRID - foodSize) / 2;
  const fy = food.y * GRID + (GRID - foodSize) / 2;
  ctx.fillStyle = '#ff1744';
  ctx.shadowColor = '#ff5252';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.roundRect(fx, fy, foodSize, foodSize, 4);
  ctx.fill();
  ctx.shadowBlur = 0;

  // snake body
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const sx = s.x * GRID + 0.5;
    const sy = s.y * GRID + 0.5;
    const alpha = 1 - (i / snake.length) * 0.4;

    if (i === 0) {
      // head
      ctx.fillStyle = '#00e676';
      ctx.shadowColor = '#00e676';
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.roundRect(sx, sy, TILE, TILE, 6);
      ctx.fill();
      ctx.shadowBlur = 0;

      // eyes
      const eyeSize = 3;
      ctx.fillStyle = '#000';
      let ex1, ey1, ex2, ey2;
      if (dir.x === 1) { ex1 = sx+TILE-6; ey1 = sy+4; ex2 = sx+TILE-6; ey2 = sy+TILE-4; }
      else if (dir.x === -1) { ex1 = sx+6; ey1 = sy+4; ex2 = sx+6; ey2 = sy+TILE-4; }
      else if (dir.y === -1) { ex1 = sx+4; ey1 = sy+6; ex2 = sx+TILE-4; ey2 = sy+6; }
      else { ex1 = sx+4; ey1 = sy+TILE-6; ex2 = sx+TILE-4; ey2 = sy+TILE-6; }
      ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle = `rgba(0, 200, 83, ${alpha})`;
      ctx.beginPath();
      ctx.roundRect(sx + 1, sy + 1, TILE - 1, TILE - 1, 5);
      ctx.fill();
    }
  }

  // particles
  particles = particles.filter(p => p.life > 0);
  for (const p of particles) {
    ctx.fillStyle = p.color.replace(')', `,${p.life})`).replace('rgb', 'rgba');
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
  }

  // pause overlay
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px "Segoe UI", system-ui';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停中', canvas.width/2, canvas.height/2 - 10);
    ctx.font = '14px "Segoe UI", system-ui';
    ctx.fillStyle = '#888';
    ctx.fillText('按空格键继续', canvas.width/2, canvas.height/2 + 20);
  }
}

function gameTick() {
  update();
  draw();
}

function restartLoop() {
  clearInterval(gameLoop);
  gameLoop = setInterval(gameTick, speed);
}

function endGame() {
  gameOver = true;
  clearInterval(gameLoop);
  const isNew = score > highScore;
  if (isNew) {
    highScore = score;
    localStorage.setItem('snakeHighScore', highScore);
    document.getElementById('highScore').textContent = highScore;
  }

  const card = document.getElementById('gameOverCard');
  card.innerHTML = `
    <div class="game-over-title">游戏结束</div>
    <div class="game-over-score">${score}</div>
    ${isNew ? '<div class="game-over-new">🎉 新纪录!</div>' : ''}
    <button class="btn" onclick="restart()">再来一局</button>
  `;
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('gameOverCard').style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'popIn 0.3s ease-out';
}

window.restart = function() {
  snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0;
  speed = 100;
  paused = false;
  gameOver = false;
  particles = [];
  ticks = 0;
  document.getElementById('score').textContent = '0';
  document.getElementById('overlay').classList.add('hidden');
  food = randomFood();
  restartLoop();
  draw();
};

document.addEventListener('keydown', e => {
  if (gameOver && e.key === ' ') { restart(); return; }
  if (e.key === ' ') { paused = !paused; e.preventDefault(); return; }
  if (paused || gameOver) return;

  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W':
      if (dir.y !== 1) nextDir = {x:0, y:-1};
      e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S':
      if (dir.y !== -1) nextDir = {x:0, y:1};
      e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A':
      if (dir.x !== 1) nextDir = {x:-1, y:0};
      e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D':
      if (dir.x !== -1) nextDir = {x:1, y:0};
      e.preventDefault(); break;
  }
});

// touch swipe
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, {passive: false});

canvas.addEventListener('touchend', e => {
  if (paused || gameOver) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 0 && dir.x !== -1) nextDir = {x:1, y:0};
    else if (dx < 0 && dir.x !== 1) nextDir = {x:-1, y:0};
  } else {
    if (dy > 0 && dir.y !== -1) nextDir = {x:0, y:1};
    else if (dy < 0 && dir.y !== 1) nextDir = {x:0, y:-1};
  }
});

// dpad buttons
document.getElementById('dpad').addEventListener('click', e => {
  if (paused || gameOver) return;
  const btn = e.target.closest('.dpad-btn');
  if (!btn || !btn.dataset.dir) return;
  const d = btn.dataset.dir;
  switch(d) {
    case 'up': if (dir.y !== 1) nextDir = {x:0, y:-1}; break;
    case 'down': if (dir.y !== -1) nextDir = {x:0, y:1}; break;
    case 'left': if (dir.x !== 1) nextDir = {x:-1, y:0}; break;
    case 'right': if (dir.x !== -1) nextDir = {x:1, y:0}; break;
  }
});

// Start
restartLoop();
draw();
</script>
</body>
</html>
